name: Test With Permissions

on:
  workflow_call:
    inputs:
      message:
        required: false
        type: string
        default: "hello"
    secrets:
      LLM_API_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ inputs.message }}"
